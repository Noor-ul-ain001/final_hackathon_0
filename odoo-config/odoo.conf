[options]
; AI Employee Odoo Configuration
; Gold Tier: Self-hosted accounting with JSON-RPC API

; Database settings
db_host = odoo-db
db_port = 5432
db_user = odoo
db_password = odoo_secure_password
db_name = ai_employee

; Admin settings
admin_passwd = admin_master_password

; Performance
workers = 2
max_cron_threads = 1
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200

; Logging
log_level = info
logrotate = True

; Server settings
xmlrpc_port = 8069
longpolling_port = 8072

; Addons path
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
